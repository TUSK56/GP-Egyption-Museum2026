name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    backend:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: VirtualMuseum Back-End
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: 8.0.x

            - name: Restore
              run: dotnet restore VirtualMuseum.slnx

            - name: Build
              run: dotnet build VirtualMuseum.slnx --no-restore --configuration Release

            - name: Test
              run: dotnet test VirtualMuseum.slnx --no-build --configuration Release

    frontend:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: VirtualMuseum Front-End
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: VirtualMuseum Front-End/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Build
              run: npm run build
